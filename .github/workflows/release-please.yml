---
name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing tag to publish (stable: easyeda-mcp-pro-vX.Y.Z; prerelease: easyeda-mcp-pro-vX.Y.Z-rc.N)'
        required: true
        type: string
      release_channel:
        description: 'Publication channel; must match the tag format'
        required: true
        default: prerelease
        type: choice
        options:
          - stable
          - prerelease
      evidence_url:
        description: 'Public issue or PR with release verification, soak, and rollback evidence'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-please:
    name: Prepare and publish release
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release Please tags/releases and asset uploads.
      pull-requests: write # Release Please creates and updates the stable release PR.
      issues: write # Release Please maintains release labels and linked issue metadata.
      id-token: write # npm provenance, artifact attestations, and stable MCP Registry OIDC.
      attestations: write # Publish build provenance for release artifacts.
    outputs:
      release_created: ${{ steps.status.outputs.release_run }}
      tag_name: ${{ steps.status.outputs.release_tag }}
      release_channel: ${{ steps.status.outputs.release_channel }}
    steps:
      # actions/checkout v7.0.0
      - name: Checkout release policy
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      # googleapis/release-please-action v5.0.0
      - name: Run Release Please
        if: github.event_name == 'push'
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Set Release Status
        id: status
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          GENERATED_TAG: ${{ steps.release.outputs.tag_name }}
          MANUAL_TAG: ${{ github.event.inputs.tag_name }}
          MANUAL_CHANNEL: ${{ github.event.inputs.release_channel }}
          EVIDENCE_URL: ${{ github.event.inputs.evidence_url }}
        run: node scripts/release-channel-policy.mjs

      # actions/checkout v7.0.0
      - name: Checkout release tag
        if: ${{ env.RELEASE_RUN == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ steps.status.outputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      # pnpm/action-setup v4.0.0
      - name: Setup pnpm
        if: ${{ env.RELEASE_RUN == 'true' }}
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      # actions/setup-node v4.0.2
      - name: Setup Node.js
        if: ${{ env.RELEASE_RUN == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.18.0'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Validate release metadata
        if: ${{ env.RELEASE_RUN == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          EXPECTED_VERSION="${RELEASE_TAG#easyeda-mcp-pro-v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [[ "$PACKAGE_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Tag version $EXPECTED_VERSION does not match package.json $PACKAGE_VERSION." >&2
            exit 1
          fi

          RELEASE_JSON="$(gh release view "$RELEASE_TAG" --json tagName,isDraft,isPrerelease)"
          if [[ "$(jq -r '.isDraft' <<<"$RELEASE_JSON")" == "true" ]]; then
            echo "Release $RELEASE_TAG is still a draft." >&2
            exit 1
          fi
          ACTUAL_PRERELEASE="$(jq -r '.isPrerelease' <<<"$RELEASE_JSON")"
          EXPECTED_PRERELEASE="false"
          if [[ "$RELEASE_CHANNEL" == "prerelease" ]]; then
            EXPECTED_PRERELEASE="true"
          fi
          if [[ "$ACTUAL_PRERELEASE" != "$EXPECTED_PRERELEASE" ]]; then
            echo "GitHub release prerelease classification does not match $RELEASE_CHANNEL." >&2
            exit 1
          fi

      - name: Install dependencies
        if: ${{ env.RELEASE_RUN == 'true' }}
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify runtime policy
        if: ${{ env.RELEASE_RUN == 'true' }}
        run: pnpm runtime:check

      - name: Verify Quality Gates
        if: ${{ env.RELEASE_RUN == 'true' }}
        run: |
          pnpm security:audit
          pnpm peers check
          pnpm format:check
          pnpm typecheck
          pnpm typecheck:extension
          pnpm lint
          pnpm lint:tools
          pnpm verify:tool-coverage
          pnpm test
          pnpm test:coverage
          pnpm test:extension:ci
          pnpm generate:tools-doc
          git diff --exit-code docs/reference/tools.md
          pnpm check:metadata
          pnpm docs:build

      - name: Build Projects
        if: ${{ env.RELEASE_RUN == 'true' }}
        run: |
          pnpm build
          pnpm check:metadata
          pnpm build:extension
          pnpm verify:extension
          pnpm check:extension-size

      - name: Generate CycloneDX SBOM
        if: ${{ env.RELEASE_RUN == 'true' }}
        # anchore/sbom-action v0.24.0
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM Artifact
        if: ${{ env.RELEASE_RUN == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.json

      - name: Attach Build Provenance (SLSA + Sigstore)
        if: ${{ env.RELEASE_RUN == 'true' }}
        # actions/attest-build-provenance v4.1.1
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            dist/**
            easyeda-bridge-extension.eext
            sbom.json

      - name: Verify NPM Token
        if: ${{ env.RELEASE_RUN == 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "$NPM_TOKEN" ]]; then
            echo "Error: NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Publish to npm
        if: ${{ env.RELEASE_RUN == 'true' }}
        run: |
          set -euo pipefail
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${PKG_VERSION} is already published; restoring the ${NPM_DIST_TAG} dist-tag."
            npm dist-tag add "${PKG_NAME}@${PKG_VERSION}" "$NPM_DIST_TAG"
          else
            npm publish --provenance --tag "$NPM_DIST_TAG"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload Assets to Release
        if: ${{ env.RELEASE_RUN == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" easyeda-bridge-extension.eext --clobber
          gh release upload "$RELEASE_TAG" sbom.json --clobber

      - name: Install mcp-publisher
        if: ${{ env.RELEASE_RUN == 'true' && env.RELEASE_CHANNEL == 'stable' }}
        run: |
          MCP_PUBLISHER_VERSION="v1.7.9"
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          ASSET="mcp-publisher_${OS}_${ARCH}.tar.gz"
          BASE="https://github.com/modelcontextprotocol/registry/releases/download"
          curl --fail --silent --show-error --location \
            --proto '=https' --tlsv1.2 \
            --output "$ASSET" "${BASE}/${MCP_PUBLISHER_VERSION}/${ASSET}"
          tar xzf mcp-publisher_*.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        if: ${{ env.RELEASE_RUN == 'true' && env.RELEASE_CHANNEL == 'stable' }}
        run: |
          set -euo pipefail
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  docker:
    name: Publish release container
    if: (github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops') && needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    needs: release-please
    permissions:
      contents: read
      packages: write # Publish exact and channel-safe GHCR tags.
    steps:
      # actions/checkout v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean version tag
        id: clean_version
        env:
          RAW_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_CHANNEL: ${{ needs.release-please.outputs.release_channel }}
        run: |
          set -euo pipefail
          STABLE_RE='^easyeda-mcp-pro-v[0-9]+\.[0-9]+\.[0-9]+$'
          PRERELEASE_RE='^easyeda-mcp-pro-v[0-9]+\.[0-9]+\.[0-9]+-rc\.[1-9][0-9]*$'
          if [[ "$RELEASE_CHANNEL" == "stable" && ! "$RAW_TAG" =~ $STABLE_RE ]]; then
            echo "Stable Docker publication requires easyeda-mcp-pro-vX.Y.Z." >&2
            exit 1
          fi
          if [[ "$RELEASE_CHANNEL" == "prerelease" && ! "$RAW_TAG" =~ $PRERELEASE_RE ]]; then
            echo "Prerelease Docker publication requires easyeda-mcp-pro-vX.Y.Z-rc.N." >&2
            exit 1
          fi
          CLEAN_VER="${RAW_TAG##*v}"
          echo "version=${CLEAN_VER}" >> "$GITHUB_OUTPUT"
          if [[ "$CLEAN_VER" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
            echo "major_minor=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid release version" >&2
            exit 1
          fi

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.clean_version.outputs.version }}
            type=raw,value=${{ steps.clean_version.outputs.major_minor }},enable=${{ needs.release-please.outputs.release_channel == 'stable' }}
            type=raw,value=latest,enable=${{ needs.release-please.outputs.release_channel == 'stable' }}
            type=raw,value=next,enable=${{ needs.release-please.outputs.release_channel == 'prerelease' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
